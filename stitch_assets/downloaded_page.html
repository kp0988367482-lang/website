<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Future Commerce - Join the Future</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Outfit:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff3366",
                        "accent": "#7000FF",
                        "background-light": "#f8f5f6",
                        "background-dark": "#050510",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "header": ["Outfit", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, rgba(255, 51, 102, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(112, 0, 255, 0.15) 0px, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-x-hidden">
    <!-- Ambient Background Elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-accent/20 blur-[120px] rounded-full"></div>
    </div>
    <!-- Layout Container -->
    <div class="relative flex flex-col min-h-screen w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- TopAppBar -->
        <header class="flex items-center justify-between py-6">
            <div class="flex items-center gap-2">
                <div class="text-primary flex size-10 shrink-0 items-center justify-center bg-primary/10 rounded-lg">
                    <span class="material-symbols-outlined"
                        style="font-variation-settings: 'FILL' 1">rocket_launch</span>
                </div>
                <h2 class="text-slate-100 text-xl font-header font-bold leading-tight tracking-tight uppercase">
                    FUTURECOM</h2>
            </div>
            <div class="flex items-center gap-1">
                <span class="material-symbols-outlined text-slate-400 text-sm">language</span>
                <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">EN/KR/TW</p>
            </div>
        </header>
        <main class="flex-1 flex flex-col items-center justify-center py-8">
            <!-- Hero Section -->
            <div class="text-center max-w-md mx-auto mb-10">
                <h1
                    class="text-slate-100 font-header text-4xl sm:text-5xl font-extrabold leading-tight mb-4 tracking-tight">
                    Join the Future
                </h1>
                <p class="text-slate-400 text-lg font-normal leading-relaxed px-2">
                    Unlock your personalized digital experience. High-end, secure, and uniquely yours.
                </p>
            </div>
            <!-- Glassmorphic Signup Form -->
            <div class="glass-card w-full max-w-lg rounded-xl p-6 sm:p-10 mb-12">
                <form class="space-y-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="block text-slate-300 text-sm font-medium ml-1">Full Name</label>
                        <div class="relative">
                            <input
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none"
                                placeholder="Enter your name" type="text" />
                        </div>
                    </div>
                    <!-- Email Address -->
                    <div class="space-y-2">
                        <label class="block text-slate-300 text-sm font-medium ml-1">Email Address</label>
                        <div class="relative">
                            <input
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none"
                                placeholder="name@example.com" type="email" />
                        </div>
                    </div>
                    <!-- Birthday -->
                    <div class="space-y-2">
                        <label class="block text-slate-300 text-sm font-medium ml-1">Birthday</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">calendar_today</span>
                            <input
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none appearance-none"
                                type="date" />
                        </div>
                    </div>
                    <!-- Dropdowns Row -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Inspiration -->
                        <div class="space-y-2">
                            <label class="block text-slate-300 text-sm font-medium ml-1">Inspiration</label>
                            <select
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none">
                                <option class="bg-background-dark">Suno AI</option>
                                <option class="bg-background-dark">Cyberpunk</option>
                                <option class="bg-background-dark">Nature</option>
                                <option class="bg-background-dark">Space</option>
                            </select>
                        </div>
                        <!-- Style -->
                        <div class="space-y-2">
                            <label class="block text-slate-300 text-sm font-medium ml-1">Style Preference</label>
                            <select
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none">
                                <option class="bg-background-dark">Dark Mode</option>
                                <option class="bg-background-dark">Glassmorphism</option>
                                <option class="bg-background-dark">Brutalism</option>
                            </select>
                        </div>
                    </div>
                    <!-- CTA Button -->
                    <div class="pt-4">
                        <button
                            class="w-full py-5 rounded-xl bg-gradient-to-r from-primary to-accent text-white font-header font-bold text-xl hover:shadow-[0_0_30px_rgba(255,51,102,0.4)] transition-all active:scale-[0.98]"
                            type="submit">
                            Join the Future
                        </button>
                    </div>
                </form>
                <!-- Small Footer Note -->
                <p class="text-center text-slate-500 text-xs mt-6">
                    By joining, you agree to our Terms of Service and Privacy Policy.
                </p>
            </div>
            <!-- Visual Decoration Footer -->
            <div class="flex gap-4 items-center justify-center opacity-40 mb-12">
                <div class="h-px w-12 bg-slate-500"></div>
                <div class="flex gap-2">
                    <div class="size-2 rounded-full bg-primary"></div>
                    <div class="size-2 rounded-full bg-accent"></div>
                    <div class="size-2 rounded-full bg-slate-100"></div>
                </div>
                <div class="h-px w-12 bg-slate-500"></div>
            </div>
        </main>
        <!-- Aesthetic Bottom Footer -->
        <footer class="py-8 flex flex-col sm:flex-row items-center justify-between border-t border-white/5 gap-4">
            <p class="text-slate-500 text-sm">© 2024 Future Commerce Inc.</p>
            <div class="flex gap-6">
                <a class="text-slate-500 hover:text-primary transition-colors" href="#">
                    <span class="material-symbols-outlined">public</span>
                </a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="#">
                    <span class="material-symbols-outlined">shield</span>
                </a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="#">
                    <span class="material-symbols-outlined">help_outline</span>
                </a>
            </div>
        </footer>
    </div>

    <script src="translator.js"></script>
</body>

</html>
