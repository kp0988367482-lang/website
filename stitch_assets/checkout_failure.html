<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款失敗 | SeoulMate KR HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030305;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, rgba(3, 3, 5, 0) 70%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glow top-[-200px] left-[-200px]"></div>

    <div class="max-w-2xl w-full flex flex-col items-center">
        <!-- Failure Card -->
        <div class="glass-card p-10 md:p-16 w-full text-center flex flex-col items-center animate-in zoom-in-95 duration-500">
            <div class="inline-flex items-center justify-center w-20 h-20 mb-8 rounded-full bg-red-500/10 border border-red-500/20 text-red-500">
                <span class="material-symbols-outlined text-4xl">error</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-4">付款未成功</h1>
            <p class="text-slate-400 mb-10 max-w-sm mx-auto">支付過程中出了點問題。請檢查您的信用卡資訊或嘗試其他支付方式。</p>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full">
                <a href="fastlane_checkout.html" class="flex-1 bg-white text-black hover:bg-slate-200 transition-colors py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">refresh</span> 重新嘗試支付
                </a>
                <button class="flex-1 bg-slate-800 text-white hover:bg-slate-700 transition-colors py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">chat</span> 聯絡技術支援
                </button>
            </div>

            <div class="mt-12 pt-8 border-t border-white/5 w-full">
                <p class="text-xs text-slate-500 mb-4">常見錯誤原因：</p>
                <div class="grid grid-cols-2 gap-2 text-[10px] text-slate-600 uppercase tracking-widest font-bold">
                    <div class="flex items-center justify-center gap-1 bg-white/5 py-2 rounded-lg">餘額不足</div>
                    <div class="flex items-center justify-center gap-1 bg-white/5 py-2 rounded-lg">驗證失敗</div>
                    <div class="flex items-center justify-center gap-1 bg-white/5 py-2 rounded-lg">網路連線中斷</div>
                    <div class="flex items-center justify-center gap-1 bg-white/5 py-2 rounded-lg">卡號錯誤</div>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <a href="index.html" class="mt-12 text-slate-500 hover:text-white transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span> 返回首頁
        </a>
    </div>
    <script src="translator.js"></script>
