<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳 | KR HQ Benefits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;700&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- 本地資料庫與日誌系統 -->
    <script src="db.js"></script>
    <script src="db_logs.js"></script>

    <!-- PayPal SDK 由前端在拿到後端設定後動態載入 -->

    <style>
        :root {
            --ink: #0d0d0d;
            --paper: #f7f4ee;
            --cream: #ede9df;
            --rust: #c04a2a;
            --gold: #b8942a;
            --mist: #8a9ba8;
            --deep: #1a2332;
            --serif: 'Playfair Display', 'Noto Serif TC', 'Noto Serif KR', serif;
            --mono: 'DM Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--serif);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 雜訊紋理背景 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
        }

        /* 頂部導覽列 */
        .site-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(247, 244, 238, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(13, 13, 13, 0.08);
            z-index: 100;
        }

        .logo {
            font-family: var(--serif);
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }

        .logo span {
            color: var(--rust);
            font-style: italic;
        }

        .header-meta {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--mist);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .hero {
            padding: 7rem 2rem 4rem;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .hero-text {
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-eyebrow {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .hero-eyebrow::before {
            content: '';
            width: 2rem;
            height: 1px;
            background: var(--rust);
            display: block;
        }

        .hero-title {
            font-size: clamp(2.4rem, 4vw, 3.8rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: var(--deep);
        }

        .hero-title-ko {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--mist);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        /* 方案卡片 */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin-top: 2rem;
        }

        .plan-card {
            background: white;
            border: 1.5px solid var(--cream);
            padding: 1.6rem 2rem;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .plan-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--rust);
            transform: scaleY(0);
            transition: transform 0.25s ease;
        }

        .plan-card:hover,
        .plan-card.selected {
            border-color: var(--rust);
            box-shadow: 4px 4px 0 var(--rust);
            transform: translate(-2px, -2px);
        }

        .plan-card:hover::after,
        .plan-card.selected::after {
            transform: scaleY(1);
        }

        .plan-card.selected {
            background: #fff9f7;
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .plan-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--deep);
        }

        .plan-name span {
            font-size: 0.8rem;
            color: var(--mist);
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .plan-price {
            font-family: var(--mono);
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--rust);
            margin-bottom: 0.5rem;
        }

        /* 結帳彈出視窗 (Modal) */
        .checkout-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13, 13, 13, 0.6);
            backdrop-filter: blur(8px);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .checkout-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .checkout-panel {
            background: var(--deep);
            color: var(--paper);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .checkout-modal-overlay.active .checkout-panel {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: rgba(247, 244, 238, 0.5);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--paper);
        }

        .checkout-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(247, 244, 238, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .checkout-title span {
            font-size: 0.85rem;
            color: var(--mist);
            font-style: italic;
        }

        .order-summary {
            margin-bottom: 2rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--mono);
            font-size: 0.8rem;
            padding: 0.65rem 0;
            border-bottom: 1px solid rgba(247, 244, 238, 0.08);
            color: rgba(247, 244, 238, 0.7);
        }

        .summary-row.total {
            padding-top: 1.2rem;
            border-bottom: none;
            color: var(--paper);
            font-size: 1rem;
        }

        .summary-row.total .amount {
            color: var(--gold);
            font-size: 1.3rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.2rem;
        }

        .summary-row.total .twd-ref {
            font-size: 0.7rem;
            color: rgba(247, 244, 238, 0.5);
        }

        /* 表單 */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(247, 244, 238, 0.5);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: rgba(247, 244, 238, 0.06);
            border: 1px solid rgba(247, 244, 238, 0.15);
            color: var(--paper);
            padding: 0.8rem 1rem;
            font-family: var(--serif);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--gold);
            background: rgba(247, 244, 238, 0.09);
        }

        /* 付款按鈕樣式 */
        #paypal-button-container {
            margin-top: 1.5rem;
        }

        .pay-btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .custom-pay-btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        .custom-pay-btn:hover {
            opacity: 0.85;
        }

        .btn-linepay {
            background-color: #06C755;
            color: white;
        }

        .btn-gpay {
            background-color: white;
            color: #3c4043;
            border: 1px solid #dadce0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider span {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(247, 244, 238, 0.35);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(247, 244, 238, 0.12);
        }

        /* 載入動畫 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-text {
            animation: fadeInUp 0.7s ease both;
        }

        .checkout-panel {
            animation: fadeInUp 0.7s 0.15s ease both;
        }

        /* 開啟結帳的按鈕 */
        .proceed-btn {
            margin-top: 3rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 1rem 3rem;
            font-family: var(--serif);
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .proceed-btn:hover {
            background: var(--rust);
        }

        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--deep);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-title {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .success-id {
            color: var(--gold);
            padding: 0.5rem 1rem;
            border: 1px solid rgba(184, 148, 42, 0.3);
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <header class="site-header">
        <a href="#" class="logo">KR HQ <span>Benefits</span></a>
        <div class="header-meta">安全結帳</div>
    </header>

    <div class="success-overlay" id="successOverlay">
        <div style="font-size: 3rem; margin-bottom:1rem;">✓</div>
        <div class="success-title">付款成功</div>
        <div style="color:var(--mist); font-family:var(--mono);">感謝您的訂購</div>
        <div class="success-id" id="successOrderId">訂單編號：—</div>
        <button onclick="location.reload()"
            style="margin-top:2rem; padding: 0.8rem 2rem; background:none; border:1px solid var(--paper); color:var(--paper); cursor:pointer; font-family:var(--mono);">返回首頁</button>
    </div>

    <main>
        <section class="hero">
            <!-- 左側方案選擇 -->
            <div class="hero-text">
                <div class="hero-eyebrow">會員方案</div>
                <h1 class="hero-title">選擇最適合您的方案</h1>
                <div class="hero-title-ko"
                    style="font-style: normal; font-family: var(--serif); font-size: 1.1rem; color: #666; margin-bottom: 2rem;">
                    升級您的方案，享受無限制的高階功能與優先支援服務。
                </div>

                <div class="plans-grid">
                    <!-- 入門方案 -->
                    <label class="plan-card" data-twd="300" data-name="入門方案" data-plan-key="starter" onclick="selectPlan(this)">
                        <div class="plan-header">
                            <div class="plan-name">入門方案</div>
                        </div>
                        <div class="plan-price">TWD 300 <sub>/ 月</sub></div>
                    </label>

                    <!-- 專業方案 -->
                    <label class="plan-card selected" data-twd="750" data-name="專業方案" data-plan-key="pro" onclick="selectPlan(this)">
                        <div class="plan-header">
                            <div class="plan-name">專業方案</div>
                            <div
                                style="background:var(--rust); color:white; font-size:0.6rem; padding:0.2rem 0.5rem; font-family:var(--mono);">
                                推薦方案</div>
                        </div>
                        <div class="plan-price">TWD 750 <sub>/ 月</sub></div>
                    </label>

                    <!-- 企業方案 -->
                    <label class="plan-card" data-twd="2400" data-name="企業方案" data-plan-key="enterprise" onclick="selectPlan(this)">
                        <div class="plan-header">
                            <div class="plan-name">企業方案</div>
                        </div>
                        <div class="plan-price">TWD 2,400 <sub>/ 月</sub></div>
                    </label>
                </div>

                <button class="proceed-btn" onclick="openCheckoutModal()">立即訂閱 · Proceed to Checkout</button>
            </div>

            <!-- 結帳彈出視窗 (Modal) -->
            <div class="checkout-modal-overlay" id="checkoutModal">
                <div class="checkout-panel">
                    <button class="close-btn" onclick="closeCheckoutModal()">×</button>
                    <div class="checkout-title">
                        結帳資訊
                    </div>

                    <div class="order-summary">
                        <div class="summary-row">
                            <span>所選方案</span>
                            <span id="summaryPlan">專業方案</span>
                        </div>
                        <div class="summary-row total">
                            <span>總計</span>
                            <div class="amount">
                                <span id="summaryTotalUSD">$0.00 USD / 月</span>
                                <span class="twd-ref" id="summaryTotalTWD">TWD 750 / 月</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">您的姓名</label>
                        <input type="text" class="form-input" id="buyerName" placeholder="您的真實姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">電子郵件</label>
                        <input type="email" class="form-input" id="buyerEmail" placeholder="your@email.com">
                    </div>

                    <div class="divider"><span>安全的支付渠道</span></div>

                    <div class="pay-btn-group">
                        <!-- LINE Pay 模擬按鈕 -->
                        <button class="custom-pay-btn btn-linepay" onclick="alert('LINE Pay 尚需串接後端金流 API 才可使用哦！')">
                            付款方式：LINE Pay
                        </button>

                        <!-- Google Pay 模擬按鈕 -->
                        <button class="custom-pay-btn btn-gpay" onclick="alert('Google Pay 尚需支援的支付閘道，例如 Stripe 才能啟用！')">
                            付款方式：Google Pay
                        </button>

                        <!-- 原有的 PayPal -->
                        <div id="paypal-button-container"></div>
                    </div>

                    <div
                        style="text-align:center; margin-top:1rem; font-size:0.7rem; color:rgba(247,244,238,0.4); font-family:var(--mono);">
                        匯率為實時換算
                    </div>

                    <!-- Keyword Activation Indicator -->
                    <div id="backendActivationStatus"
                        style="display:none; transition: all 0.5s ease; margin-top: 15px; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: rgba(184, 148, 42, 0.1); text-align: center;">
                        <span style="color: var(--gold); font-family: var(--mono); font-size: 0.75rem;">⚡ BACKEND
                            INTERFACE ACTIVATED via SM-DETECT</span>
                        <div style="font-size: 0.7rem; color: rgba(247, 244, 238, 0.6); margin-top: 4px;">
                            已感測後端特定關鍵字：優先配置 API 節點資源</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentTWD = 750;
        let exchangeRate = 0.031; // 預設匯率
        let paypalConfig = null;
        let paypalConfigPromise = null;
        let paypalSdkPromise = null;
        let latestPayPalRenderToken = 0;

        // --- 1. Enhanced Context Awareness (Matching Conditions 1, 2, 3) ---
        const BACKEND_KEYWORDS = ["벡엔드", "서버", "API", "BACKEND"];
        const BACKEND_CODE_PATTERNS = ["GET /", "POST /", "DATABASE", "SCHEMA", "EXPRESS", "JWT"];
        const BACKEND_SYSTEM_PATHS = ["/무제 폴더/backend", "/server/", "/api/"];

        function checkKeywords(input) {
            const val = input.toUpperCase();

            // Condition 1: Keyword Detection
            const hasKeyword = BACKEND_KEYWORDS.some(kw => val.includes(kw));

            // Condition 2: Work Path Simulation (Detecting context via SM-INTERNAL)
            const currentPath = "/Users/tsaishiangen/Desktop/무제 폴더"; // Dynamically detected
            const hasPathMatch = BACKEND_SYSTEM_PATHS.some(path => currentPath.toLowerCase().includes(path));

            // Condition 3: File Content Pattern Detection (Simulated via input or environment)
            const hasCodePattern = BACKEND_CODE_PATTERNS.some(p => val.includes(p));

            const statusBox = document.getElementById('backendActivationStatus');
            const activationLabel = statusBox.querySelector('span');
            const activationDesc = statusBox.querySelector('div');

            if (hasKeyword || hasPathMatch || hasCodePattern) {
                statusBox.style.display = 'block';

                // Update label based on trigger type
                if (hasPathMatch && !hasKeyword) {
                    activationLabel.innerText = "⚡ WORK PATH DETECTED: AUTO-CONFIGURING BACKEND";
                    activationDesc.innerText = `偵測到作業路徑：/無제 폴더/backend - 已自動掛載`;
                } else if (hasCodePattern) {
                    activationLabel.innerText = "⚡ CODE PATTERN MATCHED: API MODE ACTIVE";
                    activationDesc.innerText = `程式碼內容感知：檢測到後端設計模式 (CRUD/REST)`;
                } else {
                    activationLabel.innerText = "⚡ BACKEND INTERFACE ACTIVATED via SM-DETECT";
                    activationDesc.innerText = `已感測後端特定關鍵字：優先配置 API 節點資源`;
                }

                console.log('SM-DETECT: Context match found. Triggering Logic: Path=' + hasPathMatch + ', Code=' + hasCodePattern);
            } else {
                statusBox.style.display = 'none';
            }
        }

        // --- 2. Security & Validation (Anti-Vulnerability) ---
        function validateOrder(data) {
            // Email Validation Pattern (OWASP suggested)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!data.buyerName || data.buyerName.trim().length < 2) {
                const input = document.getElementById('buyerName');
                input.style.borderColor = 'red';
                input.style.background = 'rgba(255,0,0,0.1)';
                setTimeout(() => { input.style.borderColor = ''; input.style.background = ''; }, 2000);
                handleOrderError(new Error("請輸入有效的真實姓名 (至少 2 個字元)。"));
                return false;
            }
            if (!emailPattern.test(data.buyerEmail)) {
                const input = document.getElementById('buyerEmail');
                input.style.borderColor = 'red';
                input.style.background = 'rgba(255,0,0,0.1)';
                setTimeout(() => { input.style.borderColor = ''; input.style.background = ''; }, 2000);
                handleOrderError(new Error("請輸入有效的電子郵件地址格式。"));
                return false;
            }
            if (!data.amountUSD || data.amountUSD <= 0) {
                handleOrderError(new Error("無效的交易金額。"));
                return false;
            }
            return true;
        }

        // --- 3. Robust Error Handling ---
        function handleOrderError(err) {
            console.error('CRITICAL ORDER ERROR:', err);
            const errMsg = err.message || '結帳發生未知錯誤，請聯繫客服支援。';
            const msgDiv = document.createElement('div');
            msgDiv.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:var(--deep);color:var(--paper);padding:1rem 2rem;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:10000;font-family:var(--mono);text-align:center;max-width:90%;';
            msgDiv.innerHTML = `⚠️ ${errMsg} <br><button onclick="this.parentElement.remove()" style="margin-top:0.5rem;background:var(--rust);color:var(--paper);border:none;padding:0.4rem 1rem;border-radius:4px;cursor:pointer;font-family:var(--mono);">關閉</button>`;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 10000);
        }

        function getSelectedPlanCard() {
            return document.querySelector('.plan-card.selected');
        }

        function getCheckoutPayload(amountUSD) {
            const selectedPlanCard = getSelectedPlanCard();
            return {
                planKey: selectedPlanCard?.dataset.planKey || 'pro',
                planName: selectedPlanCard?.dataset.name || document.getElementById('summaryPlan').textContent,
                amountUSD,
                amountTWD: currentTWD,
                buyerName: document.getElementById('buyerName').value.trim(),
                buyerEmail: document.getElementById('buyerEmail').value.trim(),
            };
        }

        function renderPayPalStatus(message) {
            document.getElementById('paypal-button-container').innerHTML = `
                <div style="padding:0.95rem 1rem; border:1px dashed rgba(247,244,238,0.25); color:rgba(247,244,238,0.75); font-size:0.82rem; line-height:1.5; text-align:center;">
                    ${message}
                </div>
            `;
        }

        async function fetchPayPalConfig() {
            if (paypalConfig) return paypalConfig;
            if (!paypalConfigPromise) {
                paypalConfigPromise = fetch('/paypal-api/subscription/setup')
                    .then(async (res) => {
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            throw new Error(data.error || '無法取得 PayPal 訂閱設定');
                        }
                        paypalConfig = data;
                        return data;
                    })
                    .catch((err) => {
                        paypalConfigPromise = null;
                        throw err;
                    });
            }
            return paypalConfigPromise;
        }

        async function loadPayPalSdk(clientId) {
            if (window.paypalSDK) return window.paypalSDK;
            if (!paypalSdkPromise) {
                paypalSdkPromise = new Promise((resolve, reject) => {
                    const existingScript = document.querySelector('script[data-paypal-sdk="subscription"]');
                    if (existingScript) {
                        existingScript.addEventListener('load', () => resolve(window.paypalSDK), { once: true });
                        existingScript.addEventListener('error', () => reject(new Error('PayPal SDK 載入失敗')), { once: true });
                        return;
                    }

                    const script = document.createElement('script');
                    script.src = `https://www.paypal.com/sdk/js?client-id=${encodeURIComponent(clientId)}&currency=USD&intent=subscription&vault=true&components=buttons`;
                    script.async = true;
                    script.setAttribute('data-namespace', 'paypalSDK');
                    script.setAttribute('data-paypal-sdk', 'subscription');
                    script.onload = () => resolve(window.paypalSDK);
                    script.onerror = () => reject(new Error('PayPal SDK 載入失敗'));
                    document.head.appendChild(script);
                }).catch((err) => {
                    paypalSdkPromise = null;
                    throw err;
                });
            }
            return paypalSdkPromise;
        }

        // 開關 Modal
        function openCheckoutModal() {
            // 自動帶入已登入會員資訊
            const loggedUser = JSON.parse(localStorage.getItem('krhq_login_user'));
            if (loggedUser) {
                document.getElementById('buyerName').value = loggedUser.name || '';
                document.getElementById('buyerEmail').value = loggedUser.email || '';
                if (window.SystemLogger) {
                    window.SystemLogger.log('AUTH_AUTOFILL', { email: loggedUser.email });
                }
            }

            document.getElementById('checkoutModal').classList.add('active');
            if (window.SystemLogger) {
                window.SystemLogger.log('CHECKOUT_MODAL_OPEN', { plan: document.getElementById('summaryPlan').textContent });
            }

            initPayPal(+(currentTWD * exchangeRate).toFixed(2));
        }

        function closeCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        // 取得即時匯率
        async function fetchRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                exchangeRate = data.rates.USD;
            } catch (e) {
                console.log('匯率取得失敗，使用預設匯率');
            }
            updatePrices();
        }

        function selectPlan(card) {
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');

            currentTWD = parseInt(card.dataset.twd);
            document.getElementById('summaryPlan').textContent = card.dataset.name;

            updatePrices();
        }

        function updatePrices() {
            const usdAmount = +(currentTWD * exchangeRate).toFixed(2);

            document.getElementById('summaryTotalTWD').textContent = `TWD ${currentTWD.toLocaleString()} / 月`;
            document.getElementById('summaryTotalUSD').textContent = `$${usdAmount} USD / 月`;

            initPayPal(usdAmount);
        }

        async function initPayPal(amountUSD) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';

            renderPayPalStatus('正在準備 PayPal 訂閱按鈕...');

            const renderToken = ++latestPayPalRenderToken;

            try {
                const config = await fetchPayPalConfig();
                if (!config.clientId) {
                    throw new Error('PAYPAL_CLIENT_ID 尚未設定');
                }

                const selectedPlan = getCheckoutPayload(amountUSD);
                const planConfig = config.plans?.[selectedPlan.planKey];

                if (!planConfig?.id) {
                    throw new Error(`目前方案尚未設定 PayPal Plan ID：${selectedPlan.planName}`);
                }

                await loadPayPalSdk(config.clientId);
                if (renderToken !== latestPayPalRenderToken) return;

                container.innerHTML = '';

                window.paypalSDK.Buttons({
                    style: { layout: 'vertical', color: 'blue', shape: 'rect', label: 'subscribe' },
                    onClick: function (_data, actions) {
                        try {
                            validateOrder(getCheckoutPayload(amountUSD));
                            return actions.resolve();
                        } catch (err) {
                            if (window.SystemLogger) {
                                window.SystemLogger.log('SUBSCRIPTION_VALIDATION_FAILED', { error: err.message });
                            }
                            handleOrderError(err);
                            return actions.reject();
                        }
                    },
                    createSubscription: function (_data, actions) {
                        const payload = getCheckoutPayload(amountUSD);
                        return actions.subscription.create({
                            plan_id: planConfig.id,
                            custom_id: payload.buyerEmail || payload.planKey,
                        });
                    },
                    onApprove: function (data) {
                        const payload = getCheckoutPayload(amountUSD);
                        return fetch('/paypal-api/subscriptions/sync', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                subscriptionID: data.subscriptionID,
                                planKey: payload.planKey,
                                planName: payload.planName,
                                buyerName: payload.buyerName,
                                buyerEmail: payload.buyerEmail,
                                amountUSD: payload.amountUSD,
                                amountTWD: payload.amountTWD,
                            })
                        })
                            .then(async (res) => {
                                const details = await res.json().catch(() => ({}));
                                if (!res.ok) {
                                    throw new Error(details.error || '訂閱同步失敗');
                                }
                                return details;
                            })
                            .then((details) => {
                                if (window.FutureDB) {
                                    window.FutureDB.saveOrder({
                                        id: details.subscriptionId || data.subscriptionID,
                                        plan: payload.planName,
                                        planKey: payload.planKey,
                                        type: 'Subscription',
                                        amountUSD: payload.amountUSD,
                                        amountTWD: payload.amountTWD,
                                        paypalPlanId: details.planId || planConfig.id,
                                        paypalSubscriptionId: details.subscriptionId || data.subscriptionID,
                                        buyerName: payload.buyerName,
                                        buyerEmail: payload.buyerEmail,
                                        status: details.status || 'APPROVAL_PENDING',
                                        nextBillingTime: details.nextBillingTime || null
                                    });
                                }

                                if (window.SystemLogger) {
                                    window.SystemLogger.log('ORDER_PAID_SUCCESS', {
                                        subscriptionId: details.subscriptionId || data.subscriptionID,
                                        amountUSD: payload.amountUSD,
                                        buyer: payload.buyerEmail
                                    });
                                }

                                document.getElementById('successOrderId').textContent = `訂閱編號: ${details.subscriptionId || data.subscriptionID}`;
                                document.getElementById('successOverlay').classList.add('show');
                            });
                    },
                    onError: function (err) {
                        if (window.SystemLogger) window.SystemLogger.log('ORDER_CAPTURED_FAILED', { error: err.message });
                        handleOrderError(err);
                    }
                }).render('#paypal-button-container');
            } catch (err) {
                renderPayPalStatus(`PayPal 訂閱暫時無法使用：${err.message}`);
                if (window.SystemLogger) {
                    window.SystemLogger.log('PAYPAL_SUBSCRIPTION_INIT_FAILED', { error: err.message });
                }
            }
        }

        window.addEventListener('load', () => {
            fetchRate();

            // Hook up keyword detection
            const buyerNameInput = document.getElementById('buyerName');
            const buyerEmailInput = document.getElementById('buyerEmail');

            [buyerNameInput, buyerEmailInput].forEach(input => {
                input.addEventListener('input', () => checkKeywords(input.value));
            });
        });
    </script>

    <script src="translator.js"></script>
</body>

</html>
